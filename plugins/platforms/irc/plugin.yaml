name: irc-platform
kind: platform
version: 1.0.0
description: >
  IRC gateway adapter for Robin Agent.
  Connects to an IRC server and relays messages between an IRC channel
  (or DMs) and the Robin agent.  No external dependencies — uses
  Python's stdlib asyncio for the IRC protocol.
author: IfThenVoid
requires_env:
  - IRC_SERVER
  - IRC_CHANNEL
  - IRC_NICKNAME
