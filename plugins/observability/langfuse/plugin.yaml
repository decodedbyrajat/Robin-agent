name: langfuse
version: "1.0.0"
description: "Optional Langfuse observability for Robin — traces conversations, LLM calls, and tool usage. Opt-in via `robin plugins enable observability/langfuse` or `robin tools → Langfuse Observability`."
author: IfThenVoid
requires_env:
  - ROBIN_LANGFUSE_PUBLIC_KEY
  - ROBIN_LANGFUSE_SECRET_KEY
hooks:
  - pre_api_request
  - post_api_request
  - pre_llm_call
  - post_llm_call
  - pre_tool_call
  - post_tool_call
