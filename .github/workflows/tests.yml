name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  pytest:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install package + test extras
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python -e ".[dev,mcp,acp,messaging,cli]" numpy fastapi
      - name: Run test suite
        run: .venv/bin/python -m pytest tests/ -q
